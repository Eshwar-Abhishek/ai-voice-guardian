<!DOCTYPE html>
<html>
<head>
    <title>AI Voice Guardian</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>🎤 AI Voice Guardian</h1>

    <textarea id="text" placeholder="Speak or paste conversation..."></textarea>

    <div class="buttons">
        <button onclick="startListening()">🎙 Speak</button>
        <button onclick="analyze()">Analyze</button>
    </div>

    <div id="result"></div>

    <audio id="audio" controls></audio>
</div>

<script src="script.js"></script>
</body>
</html>
